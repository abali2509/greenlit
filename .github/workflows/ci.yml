name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --with pytest --extra templates pytest -v

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Ruff check
        run: uv run --with ruff ruff check src/ tests/

  wheel-smoke:
    name: Wheel smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build wheel
        run: uv build

      - name: Assert skill.md in wheel
        run: unzip -l dist/*.whl | grep -q "greenlit/skills/skill.md"

      - name: Install wheel into clean venv and run greenlit init
        run: |
          python -m venv .smoke-venv
          .smoke-venv/bin/pip install --quiet dist/*.whl
          echo "1" | .smoke-venv/bin/greenlit init
